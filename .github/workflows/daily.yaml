name: Daily AI News

# 每天早上 8:00 UTC+8 (0:00 UTC)
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily AI news
        run: python main.py
        env:
          # AI模型配置 - 统一变量，支持所有兼容OpenAI格式的模型
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          # 推送配置
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PUSH_METHOD: ${{ vars.PUSH_METHOD }}

      - name: Commit updated news (可选，如果要保存历史到仓库)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update daily AI news - $(date +'%Y-%m-%d')"
          git push
